name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Download latest securable-claude-plugin marketplace.json
        shell: bash
        run: |
          set -euo pipefail

          release_json=$(curl -fsSL https://api.github.com/repos/Securability-Engineering/securable-claude-plugin/releases/latest)
          asset_url=$(echo "$release_json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(next((a.get('browser_download_url', '') for a in d.get('assets', []) if a.get('name') == 'marketplace.json'), ''))")

          if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "marketplace.json asset was not found in the latest release."
            exit 1
          fi

          mkdir -p src/claude
          curl -fsSL "$asset_url" -o src/claude/marketplace.json
      - name: Check THIRDPARTIES.md freshness
        shell: bash
        run: |
          npm run thirdparties

          if ! git diff --quiet -- THIRDPARTIES.md; then
            echo "::warning file=THIRDPARTIES.md::THIRDPARTIES.md is out of date. Run 'npm run thirdparties' and commit the updated file."
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_MUD_0CDEB761E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/src" # App source code path
          api_location: "api" # Api source code path - optional
          output_location: "/src" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_MUD_0CDEB761E }}
          action: "close"
