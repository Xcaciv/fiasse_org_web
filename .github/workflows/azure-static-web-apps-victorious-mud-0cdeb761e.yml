name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Resolve latest securable-claude-plugin v* tag
        id: resolve_claude_tag
        shell: bash
        run: |
          tag=$(git ls-remote --tags --sort=-v:refname \
            https://github.com/Securability-Engineering/securable-claude-plugin.git \
            'refs/tags/v*' \
            | grep -v '\^{}' \
            | head -n1 \
            | sed 's|.*refs/tags/||')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Checkout securable-claude-plugin
        uses: actions/checkout@v3
        with:
          repository: Securability-Engineering/securable-claude-plugin
          ref: ${{ steps.resolve_claude_tag.outputs.tag }}
          path: src/claude
      - name: Check THIRDPARTIES.md freshness
        shell: bash
        run: |
          npm run thirdparties

          if ! git diff --quiet -- THIRDPARTIES.md; then
            echo "::warning file=THIRDPARTIES.md::THIRDPARTIES.md is out of date. Run 'npm run thirdparties' and commit the updated file."
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_MUD_0CDEB761E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/src" # App source code path
          api_location: "api" # Api source code path - optional
          output_location: "/src" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_MUD_0CDEB761E }}
          action: "close"
